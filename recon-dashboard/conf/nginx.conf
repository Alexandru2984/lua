worker_processes  1;

error_log  logs/error.log;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Lua package path
    lua_package_path "$prefix/modules/?.lua;;";

    # SSL resolver for http module
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    server {
        listen       8084;
        server_name  localhost;

        # Disable access log for static assets, enable for requests
        access_log logs/access.log;

        location / {
            default_type text/html;
            content_by_lua_file app.lua;
        }
    }
}
